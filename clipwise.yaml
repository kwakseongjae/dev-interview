name: "mochabun Demo"
description: "AI 기반 기술면접 준비 서비스 데모 — clipwise 0.7.2"

viewport:
  width: 1280
  height: 800

effects:
  cursor:
    enabled: true
    size: 20
    speed: "normal"
    clickEffect: true
    clickColor: "rgba(59, 130, 246, 0.35)"
    trail: true
    trailLength: 6
    highlight: true
    highlightRadius: 35
  background:
    type: gradient
    value: "linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%)"
    padding: 48
    borderRadius: 14
    shadow: true
  deviceFrame:
    enabled: true
    type: browser
    darkMode: true
  zoom:
    enabled: true
    intensity: light
    duration: 800
    autoZoom:
      followCursor: true
      transitionDuration: 300
      padding: 200
  speedRamp:
    enabled: true
    idleSpeed: 2.0
    actionSpeed: 0.8
  keystroke:
    enabled: false

output:
  format: mp4
  width: 1280
  height: 800
  fps: 30
  preset: balanced

steps:
  # ===== 1. Auto Login =====
  - name: "Auto login"
    actions:
      - action: navigate
        url: "http://localhost:3000/api/demo-auth?next=/"
        waitUntil: networkidle
    captureDelay: 100
    holdDuration: 400

  # ===== 2. Homepage =====
  - name: "Homepage loaded"
    actions:
      - action: waitForSelector
        selector: "textarea[aria-label='면접 유형 검색']"
        state: visible
        timeout: 15000
    captureDelay: 200
    holdDuration: 800

  # ===== 3. Open interview category popover =====
  - name: "Open category popover"
    actions:
      - action: click
        selector: "button:has-text('면접 범주')"
        timeout: 5000
        delay: 200
      - action: waitForSelector
        selector: "[data-radix-popper-content-wrapper]"
        state: visible
        timeout: 3000
    captureDelay: 200
    holdDuration: 600

  # ===== 4. Select system design =====
  - name: "Select system design"
    actions:
      - action: click
        selector: "button:has-text('시스템 설계')"
        timeout: 5000
        delay: 200
    captureDelay: 200
    holdDuration: 500

  # ===== 5. Type query (React controlled input now works natively in 0.7.2) =====
  - name: "Type interview query"
    actions:
      - action: click
        selector: "textarea[aria-label='면접 유형 검색']"
        timeout: 5000
      - action: type
        selector: "textarea[aria-label='면접 유형 검색']"
        text: "대용량 트래픽 처리 면접 준비해줘."
        delay: 45
    captureDelay: 200
    holdDuration: 600

  # ===== 6. Submit =====
  - name: "Submit query"
    actions:
      - action: click
        selector: "button[type='submit']"
        timeout: 5000
    captureDelay: 100
    holdDuration: 300

  # ===== 7. AI 질문 생성 (captureWhileWaiting으로 로딩 애니메이션 실시간 녹화) =====
  - name: "AI generating questions"
    actions:
      - action: waitForFunction
        expression: "window.location.pathname === '/search'"
        timeout: 30000
      - action: waitForSelector
        selector: ".divide-y"
        state: visible
        timeout: 120000
        captureWhileWaiting: true
        displaySpeed: 4
    captureDelay: 300
    holdDuration: 1200

  # ===== 8. Scroll questions =====
  - name: "Scroll through questions"
    actions:
      - action: scroll
        y: 350
        smooth: true
    captureDelay: 200
    holdDuration: 800

  # ===== 9. Scroll to start button =====
  - name: "Scroll to start button"
    actions:
      - action: waitForFunction
        expression: "document.querySelector('button.bg-gold')?.scrollIntoView({behavior:'smooth',block:'center'}) || true"
        timeout: 10000
    captureDelay: 300
    holdDuration: 500

  # ===== 10. Start interview =====
  - name: "Start interview"
    actions:
      - action: click
        selector: "button.bg-gold"
        timeout: 5000
        delay: 200
    captureDelay: 100
    holdDuration: 300

  # ===== 11. Interview page (captureWhileWaiting for session loading) =====
  - name: "Wait for interview page"
    actions:
      - action: waitForFunction
        expression: "window.location.pathname.startsWith('/interview')"
        timeout: 60000
        captureWhileWaiting: true
        displaySpeed: 8
      - action: waitForSelector
        selector: "textarea[placeholder='답변을 입력해주세요...']"
        state: visible
        timeout: 60000
    captureDelay: 300
    holdDuration: 1000

  # ===== 12. Write answer (no workaround needed in 0.7.2) =====
  - name: "Write answer"
    actions:
      - action: click
        selector: "textarea[placeholder='답변을 입력해주세요...']"
        timeout: 5000
      - action: type
        selector: "textarea[placeholder='답변을 입력해주세요...']"
        text: "로드 밸런서로 트래픽 분산, Redis 캐시로 DB 부하 감소, CDN으로 정적 리소스 엣지 제공, Kafka 메시지 큐로 비동기 처리를 구현합니다."
        delay: 25
    captureDelay: 200
    holdDuration: 700

  # ===== 13. Show hint =====
  - name: "Show hint"
    actions:
      - action: click
        selector: "button[aria-controls='hint-content']"
        timeout: 5000
        delay: 200
      - action: waitForSelector
        selector: "#hint-content"
        state: visible
        timeout: 5000
    captureDelay: 200
    holdDuration: 1500
    transition: fade

  # ===== 14. Close hint =====
  - name: "Close hint"
    actions:
      - action: click
        selector: "button[aria-controls='hint-content']"
        timeout: 5000
        delay: 300
    captureDelay: 150
    holdDuration: 400

  # ===== 15. Scroll back to top =====
  - name: "Scroll to top"
    actions:
      - action: scroll
        y: -400
        smooth: true
    captureDelay: 200
    holdDuration: 1000
